<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete All Expenses</title>

    <link rel="stylesheet" th:href="@{/css/deleteAll.css}">
</head>
<body>

<div class="container">

    <h1>🗑 Delete All Expenses</h1>

    <p>
        This action will permanently delete all transactions.
        <br><br>
        <strong>This action cannot be undone.</strong>
    </p>

    <form th:action="@{/deleteAll}" method="post"
          onsubmit="return confirm('Are you sure you want to delete all expenses?');">

        <button type="submit" class="delete-btn">
            Delete All Expenses
        </button>

    </form>

    <br>

    <a th:href="@{/}" class="link">
        ← Back to Home
    </a>

</div>

</body>
</html>
